<!-- ====================================================================
  FASE 2 · PARTIAL DE ENCABEZADO DE PÁGINA (PR 02)
  Destino:  Viajes/apps/uploader/templates/uploader/_page_header.html

  Slot estándar que toda vista migrada coloca al inicio de {% block content %}.
  Da: breadcrumbs + título (H1) + subtítulo opcional + zona de acción primaria.
  Unifica la jerarquía "un solo H1 y un solo CTA por vista".

  USO en una vista:
    {% block content %}
      {% include 'uploader/_page_header.html' with
         titulo='Registros de viaje'
         subtitulo='128 pasajeros · lote MAYO-12' %}
      ... contenido ...
    {% endblock %}

  Los breadcrumbs se pasan como lista de tuplas desde el context de la vista
  (opcional). Si no se pasan, se omiten. Requiere ajuste en backend SOLO si
  quieres migas dinámicas; para migas fijas, escríbelas inline en la vista.
===================================================================== -->
<header style="display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:var(--ds-sp-6);">
    <div style="min-width:0;">
        {% if breadcrumbs %}
        <nav class="ds-crumbs" aria-label="Ruta de navegación" style="margin-bottom:8px;">
            <ol>
                {% for etiqueta, url in breadcrumbs %}
                    {% if url %}<li><a href="{{ url }}">{{ etiqueta }}</a></li>
                    {% else %}<li aria-current="page">{{ etiqueta }}</li>{% endif %}
                {% endfor %}
            </ol>
        </nav>
        {% endif %}
        <h1 class="ds-h1">{{ titulo }}</h1>
        {% if subtitulo %}<p class="ds-small" style="margin-top:4px;">{{ subtitulo }}</p>{% endif %}
    </div>

    {% block page_action %}{% endblock %}
</header>
