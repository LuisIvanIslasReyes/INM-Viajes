<dialog id="modalCapturaMenor" class="ds-modal" aria-labelledby="mtitMenor">
    <div class="ds-modal-box">
        <header class="ds-modal-header"><h2 class="ds-h2" id="mtitMenor" style="font-size:18px;">Registro de menor de edad</h2>
            <button type="button" class="ds-btn ds-btn-icon ds-btn-ghost" aria-label="Cerrar" onclick="document.getElementById('modalCapturaMenor').close()"><svg class="ds-icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
        </header>
        <form method="post" action="{% url 'crear_menor' %}">
            {% csrf_token %}
            <div class="ds-modal-body" style="display:flex; flex-direction:column; gap:14px;">
                <div class="ds-field"><label class="ds-label" for="menorNombre">Nombre completo <span class="ds-req">*</span></label><input type="text" id="menorNombre" name="nombre" required class="ds-input" placeholder="Ej. Juan Pérez"></div>
                <div class="ds-field"><label class="ds-label" for="menorDoc">Número de documento</label><input type="text" id="menorDoc" name="numero_documento" class="ds-input" placeholder="Opcional"></div>
                <div class="ds-field"><span class="ds-label">Género <span class="ds-req">*</span></span>
                    <div class="ds-pills">
                        <label class="ds-pill"><input type="radio" name="genero" value="Hombre" class="ds-sr-only" required> Hombre</label>
                        <label class="ds-pill"><input type="radio" name="genero" value="Mujer" class="ds-sr-only"> Mujer</label>
                        <label class="ds-pill"><input type="radio" name="genero" value="Otro" class="ds-sr-only"> Otro</label>
                    </div>
                </div>
                <div class="ds-field"><label class="ds-label" for="menorNac">Nacionalidad <span class="ds-req">*</span></label>
                    <input type="text" id="menorNac" name="nacionalidad" list="paises-list" required class="ds-input" placeholder="Ej. CHINA, MÉXICO, ESPAÑA…" autocomplete="off">
                    <datalist id="paises-list">{% for p in paises %}<option value="{{ p.nombre }}">{{ p.nacionalidad }} ({{ p.codigo }})</option>{% endfor %}</datalist>
                </div>
                <div class="ds-field"><label class="ds-label" for="menorFechaVuelo">Fecha de vuelo <span class="ds-req">*</span></label><input type="date" name="fecha_vuelo" id="menorFechaVuelo" required class="ds-input"></div>
                <div class="ds-field"><span class="ds-label">Tipo de vuelo <span class="ds-req">*</span></span>
                    <div class="ds-pills">
                        <label class="ds-pill"><input type="radio" name="tipo" value="Local" class="ds-sr-only" required> Local (PEK-TIJ)</label>
                        <label class="ds-pill"><input type="radio" name="tipo" value="Transito" class="ds-sr-only"> Tránsito (PEK-MEX)</label>
                    </div>
                </div>
            </div>
            <footer class="ds-modal-footer">
                <button type="button" onclick="document.getElementById('modalCapturaMenor').close()" class="ds-btn ds-btn-ghost">Cancelar</button>
                <button type="submit" class="ds-btn ds-btn-primary">Guardar menor</button>
            </footer>
        </form>
    </div>
    <form method="dialog" class="ds-sr-only"><button>cerrar</button></form>
</dialog>
