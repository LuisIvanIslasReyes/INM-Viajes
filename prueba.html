<!DOCTYPE html><html lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Capturar Tiempos de Atención</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#eedfdf",
                        "secondary-fixed-dim": "#d1c3c3",
                        "on-secondary-fixed-variant": "#4e4445",
                        "inverse-primary": "#ffb3ae",
                        "primary-fixed-dim": "#ffb3ae",
                        "primary-fixed": "#ffdad7",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#554241",
                        "on-primary": "#ffffff",
                        "primary": "#4d060a",
                        "on-secondary-container": "#6c6262",
                        "inverse-surface": "#2f3133",
                        "tertiary-container": "#323b37",
                        "inverse-on-surface": "#f0f0f3",
                        "surface-dim": "#dadadc",
                        "surface-container-low": "#f3f3f6",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#3f4945",
                        "outline": "#887270",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#eedfdf",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e8e8ea",
                        "surface-tint": "#9c413f",
                        "surface-bright": "#f9f9fc",
                        "surface-variant": "#e2e2e5",
                        "on-background": "#1a1c1e",
                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#9ba5a0",
                        "surface": "#f9f9fc",
                        "error": "#ba1a1a",
                        "background": "#f9f9fc",
                        "on-primary-container": "#f1837e",
                        "secondary": "#665c5c",
                        "on-tertiary-fixed": "#151d1a",
                        "on-primary-fixed-variant": "#7d2b29",
                        "outline-variant": "#dbc0be",
                        "tertiary-fixed-dim": "#bfc9c3",
                        "tertiary": "#1c2522",
                        "tertiary-fixed": "#dbe5df",
                        "on-secondary-fixed": "#211a1a",
                        "on-primary-fixed": "#410005",
                        "surface-container": "#eeeef0",
                        "on-surface": "#1a1c1e",
                        "surface-container-highest": "#e2e2e5",
                        "primary-container": "#6b1d1d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "margin-desktop": "48px",
                        "gutter": "24px",
                        "container-max": "1280px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "data-mono": ["JetBrains Mono"],
                        "body-lg": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "label-md": ["Hanken Grotesk"],
                        "headline-sm": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "data-mono": ["13px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: theme('colors.background');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface-dim h-screen w-screen flex items-center justify-center p-margin-desktop relative overflow-y-auto">
<!-- Blurred Background Context -->
<div class="absolute inset-0 z-0 bg-surface/80 backdrop-blur-sm"></div>
<!-- Modal Container -->
<div class="relative z-10 w-full max-w-xl bg-surface-container-lowest rounded-xl shadow-xl flex flex-col h-fit max-h-[90vh] overflow-hidden border border-outline-variant/30">
<!-- Modal Header -->
<div class="px-8 py-6 border-b border-outline-variant flex items-center gap-2 bg-surface-container-lowest sticky top-0 z-20">
<span class="material-symbols-outlined text-tertiary-container text-2xl" data-icon="schedule">schedule</span>
<h1 class="font-headline-md text-headline-sm text-on-surface m-0">Capturar Tiempos de Atención</h1>
</div>
<!-- Modal Body -->
<div class="p-8 overflow-y-auto flex flex-col gap-6 bg-surface-container-lowest">
<!-- Date Section -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-baseline">
<label class="font-label-md text-[12px] text-on-surface-variant font-bold uppercase tracking-wider">Fecha *</label>
<span class="font-body-md text-[12px] text-on-surface-variant/70 italic">Cambia la fecha si el cierre fue del día anterior</span>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-data-mono text-[14px] text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-fixed transition-colors hover:border-outline" type="date" value="2026-06-04">
</div>
</div>
<!-- Main Times Section -->
<div class="grid grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="font-label-md text-[12px] text-on-surface-variant font-bold uppercase tracking-wider">Hora Inicio *</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-data-mono text-[14px] text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-fixed transition-colors hover:border-outline" type="time">
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-md text-[12px] text-on-surface-variant font-bold uppercase tracking-wider">Hora Fin *</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-data-mono text-[14px] text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-fixed transition-colors hover:border-outline" type="time">
</div>
</div>
</div>
<!-- Divider: Tiempos de atención -->
<div class="relative py-4 mt-2">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/50"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-surface-container-lowest px-4 font-headline-sm text-sm text-tertiary font-bold tracking-wide uppercase">Tiempos de atención</span>
</div>
</div>
<!-- Atención Fields -->
<div class="flex flex-col gap-5 p-2">
<!-- FMA -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-[12px] text-on-surface-variant font-bold uppercase tracking-wider">FMA</label>
<div class="flex gap-4">
<div class="relative group flex-1 min-w-[150px]">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-data-mono text-[14px] text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-fixed transition-colors hover:border-outline" type="time">
</div>
<div class="relative group flex-1 min-w-[150px]">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-data-mono text-[14px] text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-fixed transition-colors hover:border-outline" placeholder="Pers." type="number">
</div>
</div>
</div>
<!-- Mexicanos -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-[12px] text-on-surface-variant font-bold uppercase tracking-wider">Mexicanos</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-data-mono text-[14px] text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-fixed transition-colors hover:border-outline" type="time">
</div>
<!-- Extranjeros -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-[12px] text-on-surface-variant font-bold uppercase tracking-wider">Extranjeros</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-data-mono text-[14px] text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-fixed transition-colors hover:border-outline" type="time">
</div>
</div>
<!-- Divider: Revisiones Secundarias -->
<div class="relative py-4 mt-2">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/50"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-surface-container-lowest px-4 font-headline-sm text-sm text-tertiary font-bold tracking-wide uppercase">Revisiones Secundarias</span>
</div>
</div>
<!-- SR Fields -->
<div class="grid grid-cols-2 gap-6 p-2">
<div class="flex flex-col gap-2">
<label class="font-label-md text-[12px] text-on-surface-variant font-bold uppercase tracking-wider">SR Hora Inicio</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-data-mono text-[14px] text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-fixed transition-colors hover:border-outline" type="time">
</div>
<div class="flex flex-col gap-2">
<label class="font-label-md text-[12px] text-on-surface-variant font-bold uppercase tracking-wider">SR Hora Fin</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-data-mono text-[14px] text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-fixed transition-colors hover:border-outline" type="time">
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="px-8 py-5 border-t border-outline-variant bg-surface-container-lowest flex justify-end gap-4 sticky bottom-0 z-20">
<button class="px-6 py-2.5 rounded-lg font-label-md text-sm font-bold text-on-surface-variant hover:bg-surface-variant transition-colors" type="button">Cancelar</button>
<button class="px-8 py-2.5 rounded-lg font-label-md text-sm font-bold bg-primary text-on-primary hover:bg-primary/90 shadow-sm transition-all" type="button">Guardar</button>
</div>
</div>


</body></html>
